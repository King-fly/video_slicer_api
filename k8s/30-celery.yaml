apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-slicer-celery-worker
  namespace: video-slicer
  labels:
    app: video-slicer-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video-slicer-celery-worker
  template:
    metadata:
      labels:
        app: video-slicer-celery-worker
    spec:
      containers:
        - name: worker
          image: video-slicer:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - "-A"
            - "celery_app.app"
            - "worker"
            - "--loglevel=info"
            - "--concurrency=4"
          envFrom:
            - configMapRef:
                name: video-slicer-config
            - secretRef:
                name: video-slicer-secret
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-slicer-celery-beat
  namespace: video-slicer
  labels:
    app: video-slicer-celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-slicer-celery-beat
  template:
    metadata:
      labels:
        app: video-slicer-celery-beat
    spec:
      containers:
        - name: beat
          image: video-slicer:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - "-A"
            - "celery_app.app"
            - "beat"
            - "--loglevel=info"
          envFrom:
            - configMapRef:
                name: video-slicer-config
            - secretRef:
                name: video-slicer-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"