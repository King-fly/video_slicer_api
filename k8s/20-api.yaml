apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-slicer-api
  namespace: video-slicer
  labels:
    app: video-slicer-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: video-slicer-api
  template:
    metadata:
      labels:
        app: video-slicer-api
    spec:
      containers:
        - name: api
          image: video-slicer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: video-slicer-config
            - secretRef:
                name: video-slicer-secret
          env:
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: video-slicer-secret
                  key: CELERY_BROKER_URL
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: video-slicer-api
  namespace: video-slicer
spec:
  selector:
    app: video-slicer-api
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: video-slicer-api-hpa
  namespace: video-slicer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: video-slicer-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70