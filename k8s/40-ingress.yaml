apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: video-slicer-ingress
  namespace: video-slicer
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "5g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/connect-timeout: "60"
    nginx.ingress.kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: video-slicer.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: video-slicer-api
                port:
                  number: 80
  tls:
    - hosts:
        - video-slicer.example.com
      secretName: video-slicer-tls